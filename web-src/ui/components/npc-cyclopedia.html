<div class="ui-container cyclopedia-container" id="cyclopedia-container">
    <style>
        /* NPC图鉴专用样式 */
        .cyclopedia-container {
            font-family: 'Roboto Mono', monospace;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .cyclopedia-header {

        /* 图鉴完成度 */
        .completion-panel {
            background: var(--gradient-dark);

        .completion-percentage {
            color: var(--state-success);

        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .stats-panel {
                grid-template-columns: repeat(2, 1fr);

            .npcs-grid {
                grid-template-columns: repeat(2, 1fr);

            .filter-row {
                flex-direction: column;

            }
            
            .filter-group {
                flex-direction: column;
                align-items: flex-start;
            }

                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .npcs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

<script>
// NPC图鉴管理器
class NPCyclopediaManager {
    constructor() {
        this.npcs = [];
        this.filteredNPCs = [];
        this.filters = {
            rarity: 'all',
            status: 'all',
            pathway: 'all',
            search: ''
        };
        
        this.bindEvents();
        this.loadNPCs();
    }
    
    bindEvents() {
        // 关闭按钮
        document.getElementById('cyclopedia-close').addEventListener('click', () => {
            document.getElementById('cyclopedia-modal').style.display = 'none';
        });
        
        // 过滤器
        document.getElementById('filter-rarity').addEventListener('change', (e) => {
            this.filters.rarity = e.target.value;
            this.applyFilters();
        });
        
        document.getElementById('filter-status').addEventListener('change', (e) => {
            this.filters.status = e.target.value;
            this.applyFilters();
        });
        
        document.getElementById('filter-pathway').addEventListener('change', (e) => {
            this.filters.pathway = e.target.value;
            this.applyFilters();
        });
        
        document.getElementById('search-input').addEventListener('input', (e) => {
            this.filters.search = e.target.value.toLowerCase();
            this.applyFilters();
        });
        
        // 清除筛选按钮
        document.getElementById('clear-filters-btn').addEventListener('click', () => {
            this.clearFilters();
        });
    }
    
    async loadNPCs() {
        try {
            const response = await fetch('data/npcs.json');
            if (!response.ok) {
                throw new Error('无法加载NPC数据');
            }
            
            const data = await response.json();
            this.npcs = data.npcs || [];
            
            // 从游戏状态加载实际状态（这里简化处理）
            this.loadNPCStatusFromGameState();
            
            this.renderAll();
            
        } catch (error) {
            console.error('加载NPC数据失败:', error);
            // 使用备用数据
            this.loadFallbackData();
        }
    }
    
    loadNPCStatusFromGameState() {
        // 这里应该从游戏状态加载NPC的实际状态
        // 暂时使用初始状态，但可以模拟一些变化
        
        this.npcs.forEach(npc => {
            // 从localStorage或游戏状态获取实际状态
            const savedStatus = localStorage.getItem(`npc_status_${npc.id}`);
            if (savedStatus) {
                npc.currentStatus = savedStatus;
            } else {
                npc.currentStatus = npc.initial_status || 'unavailable';
            }
            
            // 模拟一些已招募的NPC
            if (npc.id === 'npc_001' || npc.id === 'npc_003') {
                npc.currentStatus = 'recruited';
            }
            
            // 模拟一些可招募的NPC（除了上面两个）
            if (npc.currentStatus === 'unavailable' && Math.random() > 0.5) {
                npc.currentStatus = 'available';
            }
        });
    }
    
    loadFallbackData() {
        // 备用数据，如果无法加载文件
        this.npcs = [
            {
                id: 'npc_001',
                name: '阿尔杰·威尔逊',
                pathway: '水手',
                sequence: '序列6',
                rarity: 'rare',
                avatar: '🧙',
                description: '前海盗船长，现为风暴教会的代罚者。性格谨慎，经验丰富，擅长海上战斗和风暴操控。',
                stats: {
                    strength: 85,
                    constitution: 78,
                    agility: 65,
                    intelligence: 72,
                    perception: 80,
                    charisma: 68
                },
                currentStatus: 'recruited',
                growth_curve: 'balanced'
            },
            {
                id: 'npc_002',
                name: '奥黛丽·霍尔',
                pathway: '观众',
                sequence: '序列7',
                rarity: 'epic',
                avatar: '👑',
                description: '贵族小姐，观众途径非凡者。擅长心理分析和社交操控，能够提供情报支持和团队增益。',
                stats: {
                    strength: 55,
                    constitution: 60,
                    agility: 70,
                    intelligence: 90,
                    perception: 95,
                    charisma: 85
                },
                currentStatus: 'unavailable',
                growth_curve: 'intelligence_focus'
            }
        ];
    }
    
    applyFilters() {
        this.filteredNPCs = this.npcs.filter(npc => {
            // 稀有度过滤
            if (this.filters.rarity !== 'all' && npc.rarity !== this.filters.rarity) {
                return false;
            }
            
            // 状态过滤
            if (this.filters.status !== 'all' && npc.currentStatus !== this.filters.status) {
                return false;
            }
            
            // 途径过滤
            if (this.filters.pathway !== 'all' && npc.pathway !== this.filters.pathway) {
                return false;
            }
            
            // 搜索过滤
            if (this.filters.search) {
                const searchText = this.filters.search;
                const searchable = `${npc.name} ${npc.pathway} ${npc.sequence} ${npc.description} ${npc.growth_curve || ''}`.toLowerCase();
                if (!searchable.includes(searchText)) {
                    return false;
                }
            }
            
            return true;
        });
        
        this.renderNPCGrid();
    }
    
    clearFilters() {
        this.filters = {
            rarity: 'all',
            status: 'all',
            pathway: 'all',
            search: ''
        };
        
        document.getElementById('filter-rarity').value = 'all';
        document.getElementById('filter-status').value = 'all';
        document.getElementById('filter-pathway').value = 'all';
        document.getElementById('search-input').value = '';
        
        this.applyFilters();
    }
    
    renderAll() {
        this.updateStatistics();
        this.applyFilters();
        this.updateCompletion();
    }
    
    updateStatistics() {
        const total = this.npcs.length;
        const recruited = this.npcs.filter(npc => npc.currentStatus === 'recruited').length;
        const available = this.npcs.filter(npc => npc.currentStatus === 'available').length;
        const legendary = this.npcs.filter(npc => npc.rarity === 'legendary').length;
        
        document.getElementById('total-npcs').textContent = total;
        document.getElementById('recruited-npcs').textContent = recruited;
        document.getElementById('available-npcs').textContent = available;
        document.getElementById('legendary-npcs').textContent = legendary;
    }
    
    renderNPCGrid() {
        const container = document.getElementById('npcs-grid');
        container.innerHTML = '';
        
        if (this.filteredNPCs.length === 0) {
            container.innerHTML = `
                <div class="no-results" style="grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--text-secondary);">
                    <i class="fas fa-search" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.5;"></i>
                    <h3 style="margin-bottom: 10px;">未找到符合条件的NPC</h3>
                    <p>尝试调整筛选条件或搜索关键词</p>
                </div>
            `;
            return;
        }
        
        this.filteredNPCs.forEach(npc => {
            const entry = this.createNPCEntry(npc);
            container.appendChild(entry);
        });
    }
    
    createNPCEntry(npc) {
        const entry = document.createElement('div');
        entry.className = `npc-entry ${npc.rarity}`;
        
        // 状态文本映射
        const statusTexts = {
            'recruited': '已招募',
            'available': '可招募',
            'unavailable': '条件不足'
        };
        
        const statusColors = {
            'recruited': 'var(--state-success)',
            'available': 'var(--state-info)',
            'unavailable': 'var(--state-danger)'
        };
        
        // 生成属性列表HTML
        let attributesHtml = '';
        if (npc.stats) {
            const stats = npc.stats;
            const attributes = [
                { label: '力量', value: stats.strength },
                { label: '体质', value: stats.constitution },
                { label: '敏捷', value: stats.agility },
                { label: '智力', value: stats.intelligence },
                { label: '感知', value: stats.perception },
                { label: '魅力', value: stats.charisma }
            ];
            
            attributesHtml = '<div class="attributes-grid">';
            attributes.forEach(attr => {
                attributesHtml += `
                    <div class="attribute-item">
                        <div class="attribute-label">${attr.label}</div>
                        <div class="attribute-value">${attr.value}</div>
                    </div>
                `;
            });
            attributesHtml += '</div>';
        }
        
        entry.innerHTML = `
            <div class="status-indicator ${npc.currentStatus === 'recruited' ? 'status-recruited' : 
                                         npc.currentStatus === 'available' ? 'status-available' : 'status-unavailable'}"
                 style="background-color: ${statusColors[npc.currentStatus]};">
                ${statusTexts[npc.currentStatus]}
            </div>
            
            <div class="entry-header">
                <span class="npc-avatar-large">${npc.avatar}</span>
                <div class="entry-name">${npc.name}</div>
                <div class="entry-details">${npc.pathway} · ${npc.sequence}</div>
            </div>
            
            <div class="entry-content">
                <div class="entry-description">${npc.description}</div>
                ${attributesHtml}
                
                ${npc.growth_curve ? `
                <div class="growth-curve">
                    <div class="growth-label">成长曲线: ${npc.growth_curve}</div>
                    <div class="growth-description">
                        ${this.getGrowthCurveDescription(npc.growth_curve)}
                    </div>
                </div>
                ` : ''}
            </div>
        `;
        
        // 点击事件
        entry.addEventListener('click', () => {
            this.showNPCDetail(npc);
        });
        
        return entry;
    }
    
    getGrowthCurveDescription(curve) {
        const descriptions = {
            'balanced': '所有属性均衡成长，适合多种战斗风格',
            'attack_focus': '攻击力成长速度是其他属性的1.5倍，追求极致输出',
            'defense_focus': '防御力和生命值成长速度是其他属性的1.5倍，生存能力强',
            'agility_focus': '敏捷和速度成长速度是其他属性的1.5倍，擅长先手和闪避',
            'intelligence_focus': '智力和感知成长速度是其他属性的1.5倍，魔法和辅助效果强',
            'power_focus': '力量和体质成长速度是其他属性的1.5倍，物理攻击和生存平衡',
            'support_focus': '智力和魅力成长速度是其他属性的1.5倍，团队增益效果显著'
        };
        
        return descriptions[curve] || '标准成长模式';
    }
    
    showNPCDetail(npc) {
        // 这里可以打开详细面板，显示更多信息
        // 暂时使用简单提示
        const detailInfo = `
            NPC: ${npc.name}
            途径: ${npc.pathway}
            序列: ${npc.sequence}
            稀有度: ${npc.rarity}
            状态: ${npc.currentStatus}
            描述: ${npc.description}
        `;
        
        if (npc.currentStatus === 'available') {
            if (confirm(`${npc.name} - 可招募\n\n是否前往招募？`)) {
                // 打开招募界面
                this.openRecruitmentForNPC(npc.id);
            }
        } else {
            alert(detailInfo);
        }
    }
    
    openRecruitmentForNPC(npcId) {
        // 这里应该打开NPC招募界面，并聚焦到指定NPC
        // 暂时使用模拟
        console.log(`打开NPC招募界面: ${npcId}`);
        alert(`正在打开 ${npcId} 的招募界面...`);
        
        // 实际应该这样做：
        // 1. 打开招募模态框
        // 2. 自动选择指定NPC
        // 3. 显示详细信息
    }
    
    updateCompletion() {
        const recruited = this.npcs.filter(npc => npc.currentStatus === 'recruited').length;
        const total = this.npcs.length;
        const percentage = (recruited / total * 100).toFixed(3);
        
        document.getElementById('completion-fill').style.width = `${percentage}%`;
        document.getElementById('completion-percentage').textContent = `${percentage}%`;
        document.getElementById('display-recruited').textContent = recruited;
        document.getElementById('display-total').textContent = total;
    }
}

// 当组件加载时初始化图鉴管理器
document.addEventListener('DOMContentLoaded', () => {
    window.npcyclopediaManager = new NPCyclopediaManager();
});
</script>
