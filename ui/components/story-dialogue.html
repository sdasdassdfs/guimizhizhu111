<!-- 剧情对话组件 -->
<div class="ui-modal story-dialogue-modal" id="story-dialogue-modal">
    <div class="modal-content dark-theme">
        <div class="modal-header">
            <h3 class="modal-title" id="dialogue-title">剧情对话</h3>
            <button class="close-btn" onclick="UIManager.hideModal()">&times;</button>
        </div>
        
        <div class="modal-body">
            <!-- NPC信息 -->
            <div class="npc-info-section">
                <div class="npc-portrait" id="npc-portrait">
                    <img src="" alt="NPC头像" id="npc-portrait-img">
                </div>
                <div class="npc-details">
                    <h4 id="npc-name">未知NPC</h4>
                    <p class="npc-description" id="npc-description">暂无描述</p>
                    <div class="npc-location" id="npc-location">位置未知</div>
                </div>
            </div>
            
            <!-- 对话内容 -->
            <div class="dialogue-content-section">
                <div class="dialogue-bubble" id="dialogue-bubble">
                    <div class="speaker" id="dialogue-speaker">说话者</div>
                    <div class="text" id="dialogue-text">对话内容将显示在这里...</div>
                </div>
                
                <!-- 选项容器 -->
                <div class="choices-container" id="choices-container">
                    <div class="choice-title">选择你的回应：</div>
                    <div class="choices-list" id="choices-list">
                        <!-- 选项将通过JavaScript动态生成 -->
                    </div>
                </div>
                
                <!-- 继续按钮（当没有选择时） -->
                <div class="continue-section" id="continue-section">
                    <button class="btn-continue" id="btn-continue">继续</button>
                </div>
            </div>
            
            <!-- 剧情进度 -->
            <div class="story-progress-section">
                <div class="progress-label">剧情进度</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-background">
                        <div class="progress-bar-fill" id="story-progress-bar"></div>
                    </div>
                    <div class="progress-text" id="story-progress-text">第1章 0%</div>
                </div>
                <div class="chapter-info">
                    <span id="current-chapter">第一章：觉醒之夜</span>
                    <span id="chapter-objectives">目标：0/3</span>
                </div>
            </div>
        </div>
        
        <div class="modal-footer">
            <button class="btn-secondary" onclick="StoryDialogue.skipDialogue()">跳过对话</button>
            <button class="btn-secondary" onclick="StoryDialogue.logConversation()">记录日志</button>
            <button class="btn-primary" onclick="StoryDialogue.autoAdvance()">自动前进</button>
        </div>
    </div>
</div>

<style>

<script>
/**
 * 剧情对话管理器
 */
class StoryDialogue {
    static currentDialogue = null;
    static currentNode = null;
    static npcData = null;
    static onComplete = null;
    
    /**
     * 开始剧情对话
     * @param {Object} npcData - NPC数据
     * @param {Object} dialogueTree - 对话树
     * @param {Function} onComplete - 完成回调
     */
    static start(npcData, dialogueTree, onComplete = null) {
        this.npcData = npcData;
        this.currentDialogue = dialogueTree;
        this.onComplete = onComplete;
        
        // 加载NPC信息
        this.loadNPCInfo();
        
        // 开始对话
        this.gotoNode(dialogueTree.startNode);
        
        // 显示模态框
        UIManager.showComponent('story-dialogue');
    }
    
    /**
     * 加载NPC信息到UI
     */
    static loadNPCInfo() {
        if (!this.npcData) return;
        
        document.getElementById('npc-name').textContent = this.npcData.name;
        document.getElementById('npc-description').textContent = this.npcData.description;
        document.getElementById('npc-location').textContent = this.npcData.location;
        
        // 如果有头像图片，设置（占位符）
        const portraitImg = document.getElementById('npc-portrait-img');
        portraitImg.src = this.npcData.portrait || 'ui/images/default-npc.png';
        portraitImg.alt = this.npcData.name;
    }
    
    /**
     * 跳转到指定对话节点
     * @param {string} nodeId - 节点ID
     */
    static gotoNode(nodeId) {
        const dialogueTree = this.currentDialogue;
        if (!dialogueTree || !dialogueTree.nodes) return;
        
        const node = dialogueTree.nodes.find(n => n.id === nodeId);
        if (!node) {
            console.error(`对话节点 ${nodeId} 未找到`);
            this.endDialogue();
            return;
        }
        
        this.currentNode = node;
        
        // 更新对话内容
        document.getElementById('dialogue-speaker').textContent = node.speaker;
        document.getElementById('dialogue-text').textContent = node.text;
        
        // 处理选项
        this.updateChoices(node);
        
        // 如果没有选项且没有nextNodeId，显示继续按钮
        const hasChoices = node.choices && node.choices.length > 0;
        const hasNextNode = node.nextNodeId || (node.choices && node.choices.some(c => c.nextNodeId));
        
        document.getElementById('choices-container').style.display = hasChoices ? 'block' : 'none';
        document.getElementById('continue-section').style.display = !hasChoices ? 'block' : 'none';
        
        // 如果没有后续内容，继续按钮将结束对话
        const continueBtn = document.getElementById('btn-continue');
        if (!hasNextNode) {
            continueBtn.textContent = '结束对话';
            continueBtn.onclick = () => this.endDialogue();
        } else {
            continueBtn.textContent = '继续';
            continueBtn.onclick = () => this.advanceDialogue();
        }
    }
    
    /**
     * 更新选项列表
     * @param {Object} node - 当前对话节点
     */
    static updateChoices(node) {
        const choicesList = document.getElementById('choices-list');
        choicesList.innerHTML = '';
        
        if (!node.choices || node.choices.length === 0) return;
        
        node.choices.forEach(choice => {
            const choiceItem = document.createElement('div');
            choiceItem.className = 'choice-item';
            choiceItem.textContent = choice.text;
            
            // 检查条件是否满足
            const isDisabled = choice.condition && !this.checkCondition(choice.condition);
            if (isDisabled) {
                choiceItem.classList.add('disabled');
                
                // 添加条件提示
                const reqSpan = document.createElement('div');
                reqSpan.className = 'choice-requirements';
                reqSpan.textContent = this.getConditionText(choice.condition);
                choiceItem.appendChild(reqSpan);
            } else {
                choiceItem.onclick = () => this.selectChoice(choice);
            }
            
            choicesList.appendChild(choiceItem);
        });
    }
    
    /**
     * 选择选项
     * @param {Object} choice - 选择的选项
     */
    static selectChoice(choice) {
        // 应用选项效果
        if (choice.effects) {
            this.applyEffects(choice.effects);
        }
        
        // 跳转到下一个节点
        if (choice.nextNodeId) {
            this.gotoNode(choice.nextNodeId);
        } else {
            this.advanceDialogue();
        }
    }
    
    /**
     * 前进对话
     */
    static advanceDialogue() {
        const node = this.currentNode;
        if (!node) return;
        
        // 如果有nextNodeId，跳转
        if (node.nextNodeId) {
            this.gotoNode(node.nextNodeId);
            return;
        }
        
        // 否则结束对话
        this.endDialogue();
    }
    
    /**
     * 结束对话
     */
    static endDialogue() {
        this.currentDialogue = null;
        this.currentNode = null;
        this.npcData = null;
        
        UIManager.hideModal();
        
        if (this.onComplete) {
            this.onComplete();
        }
    }
    
    /**
     * 检查条件是否满足
     * @param {Object} condition - 条件对象
     * @returns {boolean}
     */
    static checkCondition(condition) {
        if (!condition) return true;
        
        // 简化实现，实际游戏中需要集成GameState
        console.log('检查条件:', condition);
        return true; // 临时返回true
    }
    
    /**
     * 获取条件文本描述
     * @param {Object} condition - 条件对象
     * @returns {string}
     */
    static getConditionText(condition) {
        if (!condition) return '';
        
        switch (condition.type) {
            case 'attribute':
                return `需要${condition.attribute} ≥ ${condition.value}`;
            case 'quest':
                return `需要完成任务: ${condition.questId}`;
            case 'flag':
                return `需要标记: ${condition.flagKey}`;
            default:
                return '条件未满足';
        }
    }
    
    /**
     * 应用效果
     * @param {Object} effects - 效果对象
     */
    static applyEffects(effects) {
        // 简化实现，实际游戏中需要集成GameState
        console.log('应用效果:', effects);
    }
    
    /**
     * 跳过对话
     */
    static skipDialogue() {
        this.endDialogue();
    }
    
    /**
     * 记录对话日志
     */
    static logConversation() {
        console.log('对话记录:', {
            npc: this.npcData,
            dialogue: this.currentDialogue,
            currentNode: this.currentNode
        });
    }
    
    /**
     * 自动前进对话
     */
    static autoAdvance() {
        const interval = setInterval(() => {
            if (!this.currentNode) {
                clearInterval(interval);
                return;
            }
            
            this.advanceDialogue();
            
            // 如果对话结束，清除定时器
            if (!this.currentNode) {
                clearInterval(interval);
            }
        }, 3000); // 每3秒自动前进
    }
}
</script>
